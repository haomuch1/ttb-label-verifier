services:
  - type: web
    name: ttb-label-verifier
    runtime: docker
    # starter (not free): always-on so a reviewer's first click doesn't hit a
    # ~30s cold start from an idled free instance.
    plan: starter
    healthCheckPath: /health
    envVars:
      # The starter tier can't host a local model, so the public demo uses the
      # Anthropic backend; inside a locked-down network set EXTRACTOR=ollama
      # and point OLLAMA_URL at a self-hosted server instead.
      - key: EXTRACTOR
        value: anthropic
      # Chosen on measured data: fastest tier (~6-8s warm) with the cleanest
      # government-warning reads (see APPROACH.md "Model tier trade-offs").
      - key: EXTRACTION_MODEL
        value: claude-haiku-4-5-20251001
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RATE_LIMIT_PER_IP_PER_MIN
        value: "12"
      - key: RATE_LIMIT_DAILY_CAP
        value: "300"
